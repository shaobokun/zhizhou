{% extends "base.html" %}
{% block content %}
<a href="{{ url_for('student') }}" class="nav-back">← 返回</a>
<h1>修改记录</h1>

<form method="POST" class="form-card">
    <div class="form-group">
        <label>班级名称</label>
        <input type="text" name="class_name" value="{{ record.class_name }}" required>
    </div>
    
    <div class="form-group">
        <label>学生姓名</label>
        <input type="text" name="student_name" value="{{ record.student_name }}" required>
    </div>
    
    <div class="form-group">
        <label>扣分原因</label>
        <input type="text" name="reason" value="{{ record.reason }}" required>
    </div>
    
    <div class="form-group">
        <label>扣分</label>
        <input type="number" name="score" step="0.1" inputmode="decimal" value="{{ record.score }}">

    </div>
    
    <div class="form-group">
        <label>星期</label>
        <select name="weekday">
            <option value="周一" {% if record.weekday == "周一" %}selected{% endif %}>周一</option>
            <option value="周二" {% if record.weekday == "周二" %}selected{% endif %}>周二</option>
            <option value="周三" {% if record.weekday == "周三" %}selected{% endif %}>周三</option>
            <option value="周四" {% if record.weekday == "周四" %}selected{% endif %}>周四</option>
            <option value="周五" {% if record.weekday == "周五" %}selected{% endif %}>周五</option>
        </select>
    </div>
    
    <button type="submit" class="btn-primary">保存修改</button>
    <a href="{{ url_for('student') }}" class="btn-cancel">取消</a>
</form>

<style>
.form-card {
    background: white;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.form-group {
    margin-bottom: 16px;
}
.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}
.form-group input, .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
}
.form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: #667eea;
}
.btn-primary {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 10px;
}
.btn-cancel {
    display: block;
    text-align: center;
    padding: 12px;
    background: #f5f5f5;
    color: #666;
    border-radius: 8px;
    text-decoration: none;
}
</style>
{% endblock %}
